<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라이벌 - 공부.성장</title>
    <!-- PWA Manifest -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6366f1">
<link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #0f172a;
            --bg-light: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header {
            background: var(--bg-light);
            border-bottom: 1px solid var(--border);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 1.5rem;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 학교급 탭 (초/중/고/대학/대학원) */
        .school-level-tabs {
            display: flex;
            gap: 8px;
            padding: 15px 20px;
            overflow-x: auto;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border);
        }
        
        .school-level-tab {
            padding: 10px 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .school-level-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
        }
        
        /* 우리학교/전국 탭 */
        .scope-tabs {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: var(--bg);
        }
        
        .scope-tab {
            flex: 1;
            padding: 12px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .scope-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 주간/누적 탭 */
        .ranking-type-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .ranking-type-tab {
            flex: 1;
            padding: 12px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        
        .ranking-type-tab.active {
            background: linear-gradient(135deg, var(--success), var(--primary));
            border-color: transparent;
        }
        
        .category-badge {
            display: inline-block;
            padding: 8px 16px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: 600;
            color: var(--primary);
        }
        
        .ranking-card {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
        }
        
        .ranking-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }
        
        .ranking-card.current-user {
            border: 2px solid var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }
        
        .rank {
            font-size: 1.5rem;
            font-weight: 900;
            min-width: 40px;
            text-align: center;
        }
        
        .rank.gold { color: var(--gold); }
        .rank.silver { color: var(--silver); }
        .rank.bronze { color: var(--bronze); }
        
        .user-info {
            flex: 1;
        }
        
        .nickname {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .school-info {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .stats {
            text-align: right;
        }
        
        .hours {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-light);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        
        .nav-item.active {
            color: var(--primary);
        }
        
        .nav-icon {
            font-size: 1.5rem;
        }

        .info-banner {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏆 라이벌</h1>
    </div>
    
    <!-- 학교급 선택 (초/중/고/대학/대학원) -->
    <div class="school-level-tabs" id="schoolLevelTabs">
        <div class="school-level-tab" data-level="초등학교">📘 초등학교</div>
        <div class="school-level-tab" data-level="중학교">📗 중학교</div>
        <div class="school-level-tab active" data-level="고등학교">📕 고등학교</div>
        <div class="school-level-tab" data-level="대학교">🎓 대학교</div>
        <div class="school-level-tab" data-level="대학원">🎓 대학원</div>
    </div>
    
    <!-- 우리학교/전국 선택 -->
    <div class="scope-tabs" id="scopeTabs">
        <div class="scope-tab active" data-scope="school">우리 학교</div>
        <div class="scope-tab" data-scope="global">전국 랭킹</div>
    </div>
    
    <div class="container">
        <!-- 안내 배너 -->
        <div class="info-banner" id="infoBanner">
            💡 매주 월요일 0시에 주간 랭킹이 초기화됩니다
        </div>

        <!-- 학교 내 랭킹 -->
        <div id="schoolRanking" class="ranking-section">
            <div class="loading" id="schoolLoading">
                <div class="spinner"></div>
                <p>로딩 중...</p>
            </div>
            <div id="schoolContent" style="display: none;">
                <div class="ranking-type-tabs">
                    <div class="ranking-type-tab active" data-type="total">전체 누적</div>
                    <div class="ranking-type-tab" data-type="weekly">이번 주</div>
                </div>
                <div id="schoolRankingList"></div>
            </div>
        </div>
        
        <!-- 전국 랭킹 -->
        <div id="globalRanking" class="ranking-section" style="display: none;">
            <div class="loading" id="globalLoading">
                <div class="spinner"></div>
                <p>로딩 중...</p>
            </div>
            <div id="globalContent" style="display: none;">
                <div class="category-badge" id="categoryBadge"></div>
                
                <div class="ranking-type-tabs">
                    <div class="ranking-type-tab active" data-type="total">전체 누적</div>
                    <div class="ranking-type-tab" data-type="weekly">이번 주</div>
                </div>
                
                <div id="totalRankingList"></div>
                <div id="weeklyRankingList" style="display: none;"></div>
            </div>
        </div>
    </div>
    
    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-item">
            <div class="nav-icon">📊</div>
            <div>대시보드</div>
        </a>
        <a href="study-log.html" class="nav-item">
            <div class="nav-icon">✏️</div>
            <div>학습기록</div>
        </a>
        <a href="rivals.html" class="nav-item active">
            <div class="nav-icon">🏆</div>
            <div>라이벌</div>
        </a>
       
    </nav>
    
    <script src="api.js"></script>
    <script>
        let currentSchoolLevel = '고등학교';  // 기본값
        let currentScope = 'school';
        let currentRankingType = 'total';
        
        // 학교급 탭 전환
        document.querySelectorAll('.school-level-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.school-level-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                currentSchoolLevel = tab.dataset.level;
                loadCurrentData();
            });
        });
        
        // 우리학교/전국 탭 전환
        document.querySelectorAll('.scope-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.scope-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                currentScope = tab.dataset.scope;
                
                document.getElementById('schoolRanking').style.display = currentScope === 'school' ? 'block' : 'none';
                document.getElementById('globalRanking').style.display = currentScope === 'global' ? 'block' : 'none';
                
                loadCurrentData();
            });
        });
        
        // 랭킹 타입 전환 (전체/주간) - 우리 학교용
        document.querySelector('#schoolRanking .ranking-type-tabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.ranking-type-tab');
            if (!tab) return;
            
            document.querySelectorAll('#schoolRanking .ranking-type-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            currentRankingType = tab.dataset.type;
            displaySchoolRanking();
        });
        
        // 랭킹 타입 전환 (전체/주간) - 전국 랭킹용
        document.querySelector('#globalRanking .ranking-type-tabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.ranking-type-tab');
            if (!tab) return;
            
            document.querySelectorAll('#globalRanking .ranking-type-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            currentRankingType = tab.dataset.type;
            
            document.getElementById('totalRankingList').style.display = currentRankingType === 'total' ? 'block' : 'none';
            document.getElementById('weeklyRankingList').style.display = currentRankingType === 'weekly' ? 'block' : 'none';
        });
        
        let schoolData = null;
        let globalData = null;
        
        // 현재 데이터 로드
        async function loadCurrentData() {
            if (currentScope === 'school') {
                await loadSchoolRanking();
            } else {
                await loadGlobalRanking();
            }
        }
        
        // 학교 내 랭킹 로드
        async function loadSchoolRanking() {
            try {
                document.getElementById('schoolLoading').style.display = 'block';
                document.getElementById('schoolContent').style.display = 'none';
                
                const data = await api.getSchoolRivals();
                schoolData = data;
                
                document.getElementById('schoolLoading').style.display = 'none';
                document.getElementById('schoolContent').style.display = 'block';
                
                displaySchoolRanking();
                
            } catch (error) {
                console.error('학교 랭킹 로드 실패:', error);
                document.getElementById('schoolLoading').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>랭킹을 불러올 수 없습니다</p>
                    </div>
                `;
            }
        }
        
        // 학교 랭킹 표시
        function displaySchoolRanking() {
            if (!schoolData || !schoolData.rivals || schoolData.rivals.length === 0) {
                document.getElementById('schoolRankingList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">😊</div>
                        <p>아직 같은 학교에 다른 사용자가 없어요</p>
                    </div>
                `;
                return;
            }
            
            // 학교급 필터링
            const filtered = schoolData.rivals.filter(user => 
                user.schoolLevel && user.schoolLevel.includes(currentSchoolLevel)
            );
            
            if (filtered.length === 0) {
                document.getElementById('schoolRankingList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">😊</div>
                        <p>아직 ${currentSchoolLevel}에 다른 사용자가 없어요</p>
                    </div>
                `;
                return;
            }
            
            // 정렬
            const sorted = currentRankingType === 'total' 
                ? [...filtered].sort((a, b) => b.totalMinutes - a.totalMinutes)
                : [...filtered].sort((a, b) => b.weeklyMinutes - a.weeklyMinutes);
            
            document.getElementById('schoolRankingList').innerHTML = sorted.map((user, index) => {
                const minutes = currentRankingType === 'total' ? user.totalMinutes : user.weeklyMinutes;
                const hours = Math.floor(minutes / 60);
                const rank = index + 1;
                
                return `
                    <div class="ranking-card ${user.isCurrentUser ? 'current-user' : ''}">
                        <div class="rank ${rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : ''}">${rank}</div>
                        <div class="user-info">
                            <div class="nickname">${user.nickname} ${user.isCurrentUser ? '(나)' : ''}</div>
                            <div class="school-info">${user.schoolLevel}</div>
                        </div>
                        <div class="stats">
                            <div class="hours">${hours}시간</div>
                            <div class="label">${currentRankingType === 'total' ? '전체' : '이번 주'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 전국 랭킹 로드
        async function loadGlobalRanking() {
            try {
                document.getElementById('globalLoading').style.display = 'block';
                document.getElementById('globalContent').style.display = 'none';
                
                const data = await api.getGlobalRank(currentSchoolLevel);
                globalData = data;
                
                document.getElementById('globalLoading').style.display = 'none';
                document.getElementById('globalContent').style.display = 'block';
                
               // 카테고리 표시
const totalCount = globalData.totalCount || 0;
document.getElementById('categoryBadge').textContent = `${currentSchoolLevel} 랭킹 (총 ${totalCount}명)`;

displayGlobalRanking();
                
            } catch (error) {
                console.error('전국 랭킹 로드 실패:', error);
                document.getElementById('globalLoading').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>랭킹을 불러올 수 없습니다</p>
                    </div>
                `;
            }
        }
        
        // 전국 랭킹 표시
        function displayGlobalRanking() {
            if (!globalData) return;
            
            // 전체 누적 랭킹
            const totalList = document.getElementById('totalRankingList');
            if (!globalData.totalRanking || globalData.totalRanking.length === 0) {
                totalList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">😊</div>
                        <p>아직 랭킹 데이터가 없어요</p>
                    </div>
                `;
            } else {
    
    // 내 순위 찾기
    const myRank = globalData.totalRanking.findIndex(u => u.isCurrentUser) + 1;
    const totalCount = globalData.totalCount || globalData.totalRanking.length;
    
    // 내 순위 표시
    if (myRank > 0) {
        document.getElementById('infoBanner').innerHTML = `📊 총 ${totalCount}명 중 ${myRank}등`;
    } else {
        document.getElementById('infoBanner').innerHTML = `💡 매주 월요일 0시에 주간 랭킹이 초기화됩니다`;
    }
    
    // 학교급 필터링
    totalList.innerHTML = globalData.totalRanking.map((user, index) => {
                    const rank = index + 1;
                    return `
                        <div class="ranking-card ${user.isCurrentUser ? 'current-user' : ''}">
                            <div class="rank ${rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : ''}">${rank}</div>
                            <div class="user-info">
                                <div class="nickname">${user.nickname} ${user.isCurrentUser ? '(나)' : ''}</div>
                                <div class="school-info">${user.school} · ${user.region}</div>
                            </div>
                            <div class="stats">
                                <div class="hours">${user.totalHours}시간</div>
                                <div class="label">전체 누적</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            // 이번 주 랭킹
            const weeklyList = document.getElementById('weeklyRankingList');
            if (!globalData.weeklyRanking || globalData.weeklyRanking.length === 0) {
                weeklyList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">😊</div>
                        <p>아직 이번 주 랭킹 데이터가 없어요</p>
                    </div>
                `;
            } else {
                // 학교급 필터링
                weeklyList.innerHTML = globalData.weeklyRanking.map((user, index) => {
                    const rank = index + 1;
                    return `
                        <div class="ranking-card ${user.isCurrentUser ? 'current-user' : ''}">
                            <div class="rank ${rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : ''}">${rank}</div>
                            <div class="user-info">
                                <div class="nickname">${user.nickname} ${user.isCurrentUser ? '(나)' : ''}</div>
                                <div class="school-info">${user.school} · ${user.region}</div>
                            </div>
                            <div class="stats">
                                <div class="hours">${user.weeklyHours}시간</div>
                                <div class="label">이번 주</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }
        
        // 초기 로드
        window.addEventListener('DOMContentLoaded', () => {
            if (!isAuthenticated()) {
                window.location.href = 'index.html';
                return;
            }
            
            // 사용자 학교급 자동 선택
            const user = getCurrentUser();
            if (user && user.school_level) {
                if (user.school_level.includes('초등학교')) {
                    currentSchoolLevel = '초등학교';
                } else if (user.school_level.includes('중학교')) {
                    currentSchoolLevel = '중학교';
                } else if (user.school_level.includes('고등학교')) {
                    currentSchoolLevel = '고등학교';
                } else if (user.school_level.includes('대학교')) {
                    currentSchoolLevel = '대학교';
                } else if (user.school_level.includes('대학원')) {
                    currentSchoolLevel = '대학원';
                }
                
                // 해당 탭 활성화
                document.querySelectorAll('.school-level-tab').forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.dataset.level === currentSchoolLevel) {
                        tab.classList.add('active');
                    }
                });
            }
            
            loadSchoolRanking();
        });
    </script>
    <!-- PWA Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(() => console.log('✅ PWA 등록 성공'))
      .catch((error) => console.log('❌ PWA 등록 실패:', error));
  });
}
</script>
</body>
</html>
