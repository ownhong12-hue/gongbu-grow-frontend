<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코칭 | 공부.성장</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1B4332">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #1B4332;
  --primary-light: #2D6A4F;
  --accent: #40916C;
  --bg: #FAFAF7;
  --card-bg: #FFFFFF;
  --text: #1A1A1A;
  --text-sub: #6B6B6B;
  --text-light: #999;
  --border: #E8E8E4;
  --chat-bg: #f8faf8;
}
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  background: var(--primary);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title { font-size: 16px; font-weight: 700; color: #fff; }
.header-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.badge { font-size: 11px; padding: 5px 12px; background: rgba(255,255,255,0.15); border-radius: 20px; color: #fff; font-weight: 500; }
.back-btn { color: rgba(255,255,255,0.8); font-size: 14px; cursor: pointer; text-decoration: none; }

.tabs {
  display: flex;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  flex: 1;
  padding: 13px 0;
  font-size: 12px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  background: var(--card-bg);
  color: var(--text-light);
  border-bottom: 2px solid transparent;
  font-family: inherit;
  transition: all 0.2s;
}
.tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* 채팅 탭 */
.chat-messages {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: calc(100vh - 280px);
  background: var(--chat-bg);
  overflow-y: auto;
}
.msg { display: flex; gap: 10px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #fff; font-weight: 700;
  flex-shrink: 0;
}
.msg.user .msg-avatar { background: var(--primary-light); }
.msg-bubble {
  background: var(--card-bg);
  border: 0.5px solid var(--border);
  border-radius: 0 12px 12px 12px;
  padding: 12px 14px;
  max-width: 75%;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}
.msg.user .msg-bubble {
  background: var(--primary);
  border: none;
  border-radius: 12px 0 12px 12px;
  color: #fff;
}
.msg-time { font-size: 10px; color: var(--text-light); margin-top: 4px; text-align: right; }
.msg.user .msg-time { text-align: left; }

.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  background: var(--card-bg);
  position: sticky;
  bottom: 0;
}
.chat-input {
  flex: 1;
  padding: 11px 16px;
  border: 1px solid var(--border);
  border-radius: 24px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  background: var(--bg);
}
.chat-input:focus { border-color: var(--primary); }
.send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--primary);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s;
}
.send-btn:hover { background: var(--primary-light); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }
.typing-indicator {
  display: none;
  padding: 8px 14px;
  background: var(--card-bg);
  border: 0.5px solid var(--border);
  border-radius: 0 12px 12px 12px;
  font-size: 13px;
  color: var(--text-sub);
  width: fit-content;
}

/* 중요점 탭 */
.notes-container { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.note-card {
  background: var(--card-bg);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.note-header {
  background: var(--primary);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.note-subject { font-size: 14px; font-weight: 700; color: #fff; }
.note-save-btn {
  font-size: 11px; padding: 4px 10px;
  background: rgba(255,255,255,0.2);
  border: none; border-radius: 6px;
  color: #fff; cursor: pointer;
  font-family: inherit; font-weight: 600;
}
.note-save-btn:hover { background: rgba(255,255,255,0.3); }
.note-textarea {
  width: 100%;
  padding: 12px 16px;
  border: none;
  font-size: 13px;
  line-height: 1.7;
  font-family: inherit;
  color: var(--text);
  background: var(--card-bg);
  resize: none;
  min-height: 80px;
  outline: none;
}
.note-textarea::placeholder { color: var(--text-light); }

/* 목표 탭 */
.goals-container { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
.dday-card {
  background: var(--primary);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.dday-left { }
.dday-label { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
.dday-value { font-size: 28px; font-weight: 900; color: #fff; }
.dday-input-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.dday-input-label { font-size: 11px; color: rgba(255,255,255,0.6); }
.dday-input {
  padding: 6px 10px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
.dday-input::-webkit-calendar-picker-indicator { filter: invert(1); }

.goals-card {
  background: var(--card-bg);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}
.goals-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.goal-item { margin-bottom: 14px; }
.goal-item:last-child { margin-bottom: 0; }
.goal-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.goal-subject { font-size: 13px; font-weight: 600; color: var(--text); }
.goal-input-wrap { display: flex; align-items: center; gap: 4px; }
.goal-input {
  width: 52px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  text-align: center;
  outline: none;
  color: var(--text);
}
.goal-input:focus { border-color: var(--primary); }
.goal-pct { font-size: 12px; color: var(--text-sub); }
.goal-bar-bg { background: #e8f5e9; border-radius: 4px; height: 8px; }
.goal-bar { background: var(--primary); height: 8px; border-radius: 4px; transition: width 0.3s; }
.save-goals-btn {
  width: 100%;
  padding: 13px;
  background: var(--primary);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 4px;
  transition: background 0.2s;
}
.save-goals-btn:hover { background: var(--primary-light); }

.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 9999;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

@media (max-width: 480px) {
  .chat-messages { min-height: calc(100vh - 260px); }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">공부.성장 코치</div>
    <div class="header-sub">코칭반 전용 공간</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="badge">구독중</span>
    <a href="dashboard.html" class="back-btn">← 홈</a>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('chat')">코치 상담</button>
  <button class="tab-btn" onclick="switchTab('notes')">전과목 중요점</button>
  <button class="tab-btn" onclick="switchTab('goals')">전과목별 목표</button>
</div>

<!-- 코치 상담 탭 -->
<div id="tab-chat" class="tab-content active">
  <div class="chat-messages" id="chatMessages">
    <div class="msg">
      <div class="msg-avatar">코치</div>
      <div>
        <div class="msg-bubble">안녕하세요! 공부하다가 모르는 것 있으면 언제든지 물어봐요 😊</div>
      </div>
    </div>
  </div>
  <div class="chat-input-area">
    <input type="text" class="chat-input" id="chatInput" placeholder="질문을 입력하세요..." />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<!-- 전과목 중요점 탭 -->
<div id="tab-notes" class="tab-content">
  <div class="notes-container" id="notesContainer">
    <!-- JS로 채워짐 -->
  </div>
</div>

<!-- 전과목별 목표 탭 -->
<div id="tab-goals" class="tab-content">
  <div class="goals-container">
    <div class="dday-card">
      <div class="dday-left">
        <div class="dday-label">시험까지</div>
        <div class="dday-value" id="ddayValue">D-?</div>
      </div>
      <div class="dday-input-wrap">
        <div class="dday-input-label">시험 날짜</div>
        <input type="date" class="dday-input" id="examDateInput" onchange="saveDday()" />
      </div>
    </div>

    <div class="goals-card">
      <div class="goals-title">과목별 목표 달성률</div>
      <div id="goalsListEl"></div>
      <button class="save-goals-btn" onclick="saveGoals()">목표 저장하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="api.js"></script>
<script>
const SUBJECTS = ['국어', '수학', '영어', '사탐', '과탐', '한국사'];
const token = localStorage.getItem('gongbu_token');

if (!isAuthenticated()) {
  window.location.href = 'index.html';
}

// ── 탭 전환 ──
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

// ── 토스트 ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 채팅 ──
async function loadMessages() {
  try {
    const res = await fetch('/api/generate-questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ type: 'get_messages' })
    });
    const data = await res.json();
    if (data.success && data.messages.length > 0) {
      const container = document.getElementById('chatMessages');
      container.innerHTML = '';
      data.messages.forEach(m => appendMessage(m.role, m.message, false));
    }
  } catch(e) { console.error(e); }
}

function appendMessage(role, text, scroll = true) {
  const container = document.getElementById('chatMessages');
  const isUser = role === 'user';
  const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = 'msg' + (isUser ? ' user' : '');
  div.innerHTML = `
    <div class="msg-avatar">${isUser ? '나' : '코치'}</div>
    <div>
      <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
      <div class="msg-time">${time}</div>
    </div>
  `;
  container.appendChild(div);
  if (scroll) container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('sendBtn');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  btn.disabled = true;
  appendMessage('user', msg);

  const typing = document.createElement('div');
  typing.className = 'msg';
  typing.id = 'typing';
  typing.innerHTML = `<div class="msg-avatar">코치</div><div class="typing-indicator" style="display:block;">답변 작성 중...</div>`;
  document.getElementById('chatMessages').appendChild(typing);
  document.getElementById('chatMessages').scrollTop = 999999;

  try {
    const res = await fetch('/api/generate-questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ type: 'chat', message: msg })
    });
    const data = await res.json();
    document.getElementById('typing')?.remove();
    if (data.success) {
      appendMessage('coach', data.reply);
    } else {
      appendMessage('coach', '잠시 오류가 발생했어요. 다시 시도해줘요!');
    }
  } catch(e) {
    document.getElementById('typing')?.remove();
    appendMessage('coach', '잠시 오류가 발생했어요. 다시 시도해줘요!');
  }
  btn.disabled = false;
}

document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── 중요점 ──
let notesData = {};

function renderNotes() {
  const container = document.getElementById('notesContainer');
  container.innerHTML = SUBJECTS.map(s => `
    <div class="note-card">
      <div class="note-header">
        <span class="note-subject">${s}</span>
        <button class="note-save-btn" onclick="saveNote('${s}')">저장</button>
      </div>
      <textarea class="note-textarea" id="note-${s}" placeholder="${s} 중요점을 입력하세요...">${notesData[s] || ''}</textarea>
    </div>
  `).join('');
}

async function loadNotes() {
  try {
    const res = await fetch('/api/generate-questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ type: 'get_notes' })
    });
    const data = await res.json();
    if (data.success) {
      data.notes.forEach(n => { notesData[n.subject] = n.content; });
    }
  } catch(e) { console.error(e); }
  renderNotes();
}

async function saveNote(subject) {
  const content = document.getElementById('note-' + subject).value;
  try {
    const res = await fetch('/api/generate-questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ type: 'save_note', subject, content })
    });
    const data = await res.json();
    if (data.success) showToast(subject + ' 저장완료!');
  } catch(e) { showToast('저장 실패'); }
}

// ── 목표 ──
let goalsData = {};
let examDate = '';

function renderGoals() {
  const container = document.getElementById('goalsListEl');
  container.innerHTML = SUBJECTS.map(s => {
    const val = goalsData[s] || 0;
    return `
      <div class="goal-item">
        <div class="goal-row">
          <span class="goal-subject">${s}</span>
          <div class="goal-input-wrap">
            <input type="number" class="goal-input" id="goal-${s}" value="${val}" min="0" max="100" onchange="updateBar('${s}')" />
            <span class="goal-pct">%</span>
          </div>
        </div>
        <div class="goal-bar-bg"><div class="goal-bar" id="bar-${s}" style="width:${val}%"></div></div>
      </div>
    `;
  }).join('');
}

function updateBar(subject) {
  const val = Math.min(100, Math.max(0, parseInt(document.getElementById('goal-' + subject).value) || 0));
  document.getElementById('bar-' + subject).style.width = val + '%';
}

function updateDday() {
  if (!examDate) { document.getElementById('ddayValue').textContent = 'D-?'; return; }
  const diff = Math.ceil((new Date(examDate) - new Date()) / (1000 * 60 * 60 * 24));
  document.getElementById('ddayValue').textContent = diff >= 0 ? 'D-' + diff : 'D+' + Math.abs(diff);
}

async function saveDday() {
  examDate = document.getElementById('examDateInput').value;
  updateDday();
  const goals = {};
  SUBJECTS.forEach(s => { goals[s] = parseInt(document.getElementById('goal-' + s)?.value) || 0; });
  try {
    await fetch('/api/generate-questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ type: 'save_profile', exam_date: examDate, subject_goals: goals })
    });
  } catch(e) {}
}

async function saveGoals() {
  const goals = {};
  SUBJECTS.forEach(s => { goals[s] = parseInt(document.getElementById('goal-' + s)?.value) || 0; });
  try {
    const res = await fetch('/api/generate-questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ type: 'save_profile', exam_date: examDate || null, subject_goals: goals })
    });
    const data = await res.json();
    if (data.success) showToast('목표 저장완료!');
  } catch(e) { showToast('저장 실패'); }
}

async function loadProfile() {
  try {
    const res = await fetch('/api/generate-questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ type: 'get_profile' })
    });
    const data = await res.json();
    if (data.success && data.profile) {
      if (data.profile.exam_date) {
        examDate = data.profile.exam_date.split('T')[0];
        document.getElementById('examDateInput').value = examDate;
        updateDday();
      }
      if (data.profile.subject_goals) {
        goalsData = data.profile.subject_goals;
      }
    }
  } catch(e) { console.error(e); }
  renderGoals();
}

// ── 초기화 ──
loadMessages();
loadNotes();
loadProfile();
</script>
</body>
</html>
