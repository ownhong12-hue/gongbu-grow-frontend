<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공부 타이머 - 공부.성장</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg: #ffffff; --bg-light: #f8fafc; --bg-lighter: #f1f5f9;
            --text: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
        }
        
        body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        .header { background: var(--bg-light); border-bottom: 1px solid var(--border); padding: 15px 20px; display: flex; align-items: center; gap: 15px; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .back-btn:hover { border-color: var(--primary); transform: scale(1.05); }
        .header-title { font-size: 1.2rem; font-weight: 700; }
        
        .timer-container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .today-total-banner { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .today-total-label { font-size: 0.9rem; opacity: 0.9; margin-bottom: 5px; }
        .today-total-time { font-size: 2rem; font-weight: 900; }
        
        .timer-display { background: linear-gradient(135deg, #f8fafc, #f1f5f9); border: 2px solid var(--border); border-radius: 30px; padding: 60px 40px 30px 40px; text-align: center; margin-bottom: 30px; position: relative; overflow: hidden; }
        .timer-display::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%); animation: pulse 3s ease-in-out infinite; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 0.8; } }
        
        .timer-display.active::before { animation: pulse 2s ease-in-out infinite; background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%); }
        .subject-label { position: relative; z-index: 1; display: inline-block; padding: 8px 20px; background: #ffffff; border: 1px solid var(--border); border-radius: 20px; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 30px; }
        .time-display { position: relative; z-index: 1; font-family: 'Black Han Sans', sans-serif; font-size: 5rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 30px; letter-spacing: 4px; }
        .timer-display.active .time-display { background: linear-gradient(135deg, var(--success), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        
        .record-messages { position: relative; z-index: 1; max-height: 200px; overflow-y: auto; margin-top: 20px; }
        .record-message { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); border-radius: 12px; padding: 12px 16px; margin-bottom: 10px; font-size: 0.95rem; color: var(--success); font-weight: 600; animation: slideIn 0.3s ease; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .controls { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; font-family: 'Noto Sans KR', sans-serif; }
        .btn-start { background: linear-gradient(135deg, var(--success), var(--primary)); color: white; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3); }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4); }
        .btn-stop { background: linear-gradient(135deg, var(--danger), var(--warning)); color: white; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3); }
        .btn-stop:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(239, 68, 68, 0.4); }
        .btn-reset { background: var(--bg-light); border: 1px solid var(--border); color: var(--text); }
        .btn-reset:hover { border-color: var(--primary); }
        
        .subject-selector { background: var(--bg-light); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .selector-title { font-size: 1rem; font-weight: 700; margin-bottom: 15px; }
        .subject-chips { display: flex; flex-wrap: wrap; gap: 10px; }
        .subject-chip { padding: 10px 20px; background: var(--bg); border: 2px solid var(--border); border-radius: 20px; cursor: pointer; transition: all 0.3s ease; font-weight: 600; }
        .subject-chip:hover { border-color: var(--primary); }
        .subject-chip.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-color: transparent; color: white; }
        
        .today-sessions { background: var(--bg-light); border: 1px solid var(--border); border-radius: 20px; padding: 25px; }
        .today-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .today-title { font-size: 1.1rem; font-weight: 700; }
        .session-list { display: flex; flex-direction: column; gap: 12px; }
        .session-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--bg); border-radius: 12px; border: 1px solid var(--border); }
        .session-subject { display: inline-block; padding: 4px 12px; background: var(--bg-lighter); border-radius: 12px; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; }
        .session-time { font-size: 0.85rem; color: var(--text-muted); }
        .session-duration { font-size: 1.2rem; font-weight: 700; }
        
        @media (max-width: 600px) {
            .time-display { font-size: 3.5rem; }
            .timer-display { padding: 40px 20px 20px 20px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div style="display: flex; gap: 10px;">
            <button class="back-btn" onclick="window.location.href='dashboard.html'">←</button>
            <button class="back-btn" onclick="window.location.href='index.html'" title="처음으로">🏠</button>
        </div>
        <h1 class="header-title">⏱️ 공부 타이머</h1>
    </header>
    
    <div class="timer-container">
        <div class="today-total-banner">
            <div class="today-total-label">📊 오늘 총 공부 시간</div>
            <div class="today-total-time" id="todayTotalBanner">0분</div>
        </div>
        
        <div class="timer-display" id="timerDisplay">
            <div class="subject-label" id="currentSubjectLabel">과목을 선택하세요</div>
            <div class="time-display" id="timeDisplay">00:00:00</div>
            <div class="record-messages" id="recordMessages"></div>
        </div>
        
        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startTimer()">▶️ 시작</button>
            <button class="btn btn-stop" id="stopBtn" onclick="stopTimer()" style="display: none;">⏸️ 정지</button>
            <button class="btn btn-reset" id="resetBtn" onclick="resetTimer()">🔄 리셋</button>
        </div>
        
        <div class="subject-selector">
            <div class="selector-title">📚 과목 선택</div>
            <div class="subject-chips">
                <div class="subject-chip" data-subject="국어" onclick="selectSubject(this)">국어</div>
                <div class="subject-chip" data-subject="영어" onclick="selectSubject(this)">영어</div>
                <div class="subject-chip" data-subject="수학" onclick="selectSubject(this)">수학</div>
                <div class="subject-chip" data-subject="과학" onclick="selectSubject(this)">과학</div>
                <div class="subject-chip" data-subject="사회" onclick="selectSubject(this)">사회</div>
                <div class="subject-chip" data-subject="기타" onclick="selectSubject(this)">기타</div>
            </div>
        </div>
        
        <div class="today-sessions">
            <div class="today-header">
                <div class="today-title">📅 오늘의 상세 기록</div>
            </div>
            <div class="session-list" id="sessionList">
                <div style="text-align: center; color: var(--text-muted); padding: 20px;">아직 기록이 없습니다</div>
            </div>
        </div>
    </div>
    
    <script>
        let timerInterval = null;
        let seconds = 0;
        let currentSubject = null;
        let startTime = null;
        
        // 페이지 로드 시 저장된 타이머 복구
        function restoreTimer() {
            const savedTimer = localStorage.getItem('gongbu_timer_state');
            if (savedTimer) {
                try {
                    const timerState = JSON.parse(savedTimer);
                    
                    if (timerState.isRunning && timerState.startTime) {
                        currentSubject = timerState.subject;
                        
                        // 과목 선택 복구
                        document.querySelectorAll('.subject-chip').forEach(chip => {
                            if (chip.dataset.subject === currentSubject) {
                                chip.classList.add('active');
                            }
                        });
                        
                        document.getElementById('currentSubjectLabel').textContent = currentSubject;
                        
                        // 경과 시간 계산 (앱 닫혀있던 시간 포함!)
                        startTime = timerState.startTime;
                        seconds = Math.floor((Date.now() - startTime) / 1000);
                        
                        // 타이머 자동 재개
                        timerInterval = setInterval(() => {
    seconds = Math.floor((Date.now() - startTime) / 1000);
    updateDisplay();
    saveTimerState(); // 1초마다 저장
}, 1000);
                        
                        document.getElementById('timerDisplay').classList.add('active');
                        document.getElementById('startBtn').style.display = 'none';
                        document.getElementById('stopBtn').style.display = 'block';
                        
                        updateDisplay();
                        console.log('✅ 타이머 복구 완료! 경과 시간:', seconds, '초');
                    }
                } catch (error) {
                    console.error('타이머 복구 실패:', error);
                    localStorage.removeItem('gongbu_timer_state');
                }
            }
        }
        
        // 타이머 상태 저장
        function saveTimerState() {
            if (startTime && currentSubject) {
                const timerState = {
                    isRunning: true,
                    subject: currentSubject,
                    startTime: startTime
                };
                localStorage.setItem('gongbu_timer_state', JSON.stringify(timerState));
            } else {
                localStorage.removeItem('gongbu_timer_state');
            }
        }
        
        // 과목 선택
        function selectSubject(element) {
            document.querySelectorAll('.subject-chip').forEach(chip => chip.classList.remove('active'));
            element.classList.add('active');
            currentSubject = element.dataset.subject;
            document.getElementById('currentSubjectLabel').textContent = currentSubject;
        }
        
        // 타이머 시작
        function startTimer() {
            if (!currentSubject) {
                alert('과목을 먼저 선택해주세요!');
                return;
            }
            
            if (timerInterval) return;
            
            startTime = Date.now() - (seconds * 1000);
            
            timerInterval = setInterval(() => {
                seconds = Math.floor((Date.now() - startTime) / 1000);
                updateDisplay();
                saveTimerState();
            }, 1000);
            
            document.getElementById('timerDisplay').classList.add('active');
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            
            saveTimerState();
        }
        
        // 타이머 정지 (기록만 저장, 타이머는 리셋하지 않음!)
        function stopTimer() {
            if (!timerInterval) return;
            
            clearInterval(timerInterval);
            timerInterval = null;
            
            // 세션 저장
            if (seconds > 0) {
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                
                const messagesContainer = document.getElementById('recordMessages');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'record-message';
                
                let timeText = '';
                if (hours > 0) {
                    timeText = `${hours}시간 ${minutes}분`;
                } else if (minutes > 0) {
                    timeText = `${minutes}분`;
                } else {
                    timeText = `${seconds}초`;
                }
                
                messageDiv.textContent = `✅ ${timeText}이 기록되었습니다!`;
                messagesContainer.insertBefore(messageDiv, messagesContainer.firstChild);
                
                saveSession();
                
                // 타이머 리셋
                seconds = 0;
                startTime = null;
                updateDisplay();
            }
            
            document.getElementById('timerDisplay').classList.remove('active');
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            
            localStorage.removeItem('gongbu_timer_state');
        }
        
        // 타이머 리셋
        function resetTimer() {
            if (timerInterval) {
                if (!confirm('진행 중인 타이머를 리셋하시겠습니까?')) return;
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('timerDisplay').classList.remove('active');
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('stopBtn').style.display = 'none';
            }
            
            seconds = 0;
            startTime = null;
            updateDisplay();
            localStorage.removeItem('gongbu_timer_state');
        }
        
        // 디스플레이 업데이트
        function updateDisplay() {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            const timeString = 
                String(hours).padStart(2, '0') + ':' +
                String(minutes).padStart(2, '0') + ':' +
                String(secs).padStart(2, '0');
            
            document.getElementById('timeDisplay').textContent = timeString;
        }
        
        // 세션 저장
        async function saveSession() {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            
            const session = {
                subject: currentSubject,
                duration: seconds,
                date: new Date().toISOString(),
                timestamp: Date.now()
            };
            
            const logs = JSON.parse(localStorage.getItem('gongbu_study_logs') || '[]');
            logs.push(session);
            localStorage.setItem('gongbu_study_logs', JSON.stringify(logs));
            
            try {
                await api.addStudyLog({
                    subject: currentSubject,
                    hours: hours,
                    minutes: minutes,
                    date: new Date().toISOString().split('T')[0]
                });
                console.log('✅ Backend 저장 완료');
            } catch (error) {
                console.error('❌ Backend 저장 실패:', error);
            }
            
            const points = Math.floor(seconds / 360);
            const user = JSON.parse(localStorage.getItem('gongbu_user') || '{}');
            user.points = (user.points || 0) + points;
            localStorage.setItem('gongbu_user', JSON.stringify(user));
            
            loadTodaySessions();
            updateTodayTotal();
        }
        
        // 오늘 총 시간 업데이트
        function updateTodayTotal() {
            const logs = JSON.parse(localStorage.getItem('gongbu_study_logs') || '[]');
            const today = new Date().toDateString();
            
            const todaySessions = logs.filter(log => {
                const logDate = new Date(log.date).toDateString();
                return logDate === today;
            });
            
            const totalSeconds = todaySessions.reduce((sum, session) => sum + session.duration, 0);
            const totalMinutes = Math.floor(totalSeconds / 60);
            const totalHours = Math.floor(totalMinutes / 60);
            
            let displayText;
            if (totalHours > 0) {
                displayText = `${totalHours}시간 ${totalMinutes % 60}분`;
            } else if (totalMinutes > 0) {
                displayText = `${totalMinutes}분`;
            } else {
                displayText = '0분';
            }
            
            document.getElementById('todayTotalBanner').textContent = displayText;
        }
        
        // 오늘의 세션 로드
        function loadTodaySessions() {
            const logs = JSON.parse(localStorage.getItem('gongbu_study_logs') || '[]');
            const today = new Date().toDateString();
            
            const todaySessions = logs.filter(log => {
                const logDate = new Date(log.date).toDateString();
                return logDate === today;
            });
            
            const listContainer = document.getElementById('sessionList');
            
            if (todaySessions.length === 0) {
                listContainer.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">아직 기록이 없습니다</div>';
                return;
            }
            
            listContainer.innerHTML = todaySessions.reverse().map(session => {
                const hours = Math.floor(session.duration / 3600);
                const minutes = Math.floor((session.duration % 3600) / 60);
                const time = new Date(session.date).toLocaleTimeString('ko-KR', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                let durationText;
                if (hours > 0) {
                    durationText = `${hours}시간 ${minutes}분`;
                } else {
                    durationText = `${minutes}분`;
                }
                
                return `
                    <div class="session-item">
                        <div>
                            <div class="session-subject">${session.subject}</div>
                            <div class="session-time">${time}</div>
                        </div>
                        <div class="session-duration">${durationText}</div>
                    </div>
                `;
            }).join('');
        }
        
        // 초기 로드
        window.addEventListener('DOMContentLoaded', () => {
            restoreTimer();
            loadTodaySessions();
            updateTodayTotal();
        });
    </script>
    <script src="api.js"></script>
